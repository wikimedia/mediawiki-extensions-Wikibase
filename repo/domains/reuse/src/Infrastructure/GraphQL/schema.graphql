type Query {
  "Fetch a single item by its ID, including labels, descriptions, aliases, sitelinks, and statements."
  item(id: ItemId!): Item

  "Fetch multiple items by their IDs, including labels, descriptions, aliases, sitelinks, and statements."
  itemsById(ids: [ItemId!]!): [Item]!

  "Fetch an item by external ID property and value. Returns the item if it was uniquely identified, a list of item IDs if multiple were found, or null if no match is found."
  itemByExternalId(
    "The property ID of the external identifier."
    property: PropertyId!

    "The external identifier value to search for."
    externalId: String!
  ): ItemByExternalIdResult

  "Search for items that match one or more statements-based filters"
  searchItems(
    "Filter describing which statement properties and values must match."
    query: ItemSearchFilter!

    "The maximum number of items to return (up to 50)"
    first: Int! = 10

    "Cursor that defines the position after which results should be returned. Usually the value of endCursor from the previous request"
    after: String
  ): ItemSearchResultConnection!

  "Look up a single item by a sitelink"
  itemBySitelink(
    "The sitelink's siteId"
    siteId: SiteId!

    "The sitelink's title"
    title: String!
  ): Item
}

scalar ItemId

type Item implements LabelProvider & DescriptionProvider {
  id: ItemId!
  label(languageCode: LanguageCode!): String
  labelWithLanguageFallback(languageCode: LanguageCode!): LabelWithLanguage
  description(languageCode: LanguageCode!): String
  aliases(languageCode: LanguageCode!): [String]!
  sitelink(siteId: SiteId!): Sitelink
  statements(propertyId: PropertyId!): [Statement]!
  bestStatements(propertyId: PropertyId!): [Statement]!
}

interface LabelProvider {
  label(languageCode: LanguageCode!): String
  labelWithLanguageFallback(languageCode: LanguageCode!): LabelWithLanguage
}

scalar LanguageCode

type LabelWithLanguage {
  languageCode: LanguageCode!
  value: String!
}

interface DescriptionProvider {
  description(languageCode: LanguageCode!): String
}

scalar SiteId

type Sitelink {
  title: String!
  url: String!
}

scalar PropertyId

type Statement implements PropertyValuePair {
  property: PredicateProperty!
  value: Value
  valueType: ValueType!
  id: String!
  rank: Rank!
  qualifiers(propertyId: PropertyId!): [Qualifier]!
  references: [Reference]!
}

interface PropertyValuePair {
  property: PredicateProperty!
  value: Value
  valueType: ValueType!
}

type PredicateProperty implements LabelProvider {
  id: String!
  dataType: String
  label(languageCode: LanguageCode!): String
  labelWithLanguageFallback(languageCode: LanguageCode!): LabelWithLanguage
}

union Value = CommonsMediaValue | GeoShapeValue | TabularValue | UrlValue | ExternalIdValue | ItemValue | PropertyValue | GlobeCoordinateValue | MonolingualTextValue | QuantityValue | StringValue | TimeValue | EntityValue | UnknownValue

type CommonsMediaValue implements StringContentProvider & UrlProvider {
  content: String!
  url: String
}

interface StringContentProvider {
  content: String!
}

interface UrlProvider {
  url: String
}

type GeoShapeValue implements StringContentProvider & UrlProvider {
  content: String!
  url: String
}

type TabularValue implements StringContentProvider & UrlProvider {
  content: String!
  url: String
}

type UrlValue implements StringContentProvider & UrlProvider {
  content: String!
  url: String
}

type ExternalIdValue implements StringContentProvider & UrlProvider {
  content: String!
  url: String
}

type ItemValue implements LabelProvider & DescriptionProvider {
  id: String!
  label(languageCode: LanguageCode!): String
  labelWithLanguageFallback(languageCode: LanguageCode!): LabelWithLanguage
  description(languageCode: LanguageCode!): String
}

type PropertyValue implements LabelProvider {
  id: String!
  label(languageCode: LanguageCode!): String
  labelWithLanguageFallback(languageCode: LanguageCode!): LabelWithLanguage
}

type GlobeCoordinateValue {
  latitude: Float!
  longitude: Float!
  precision: Float
  globe: String!
}

type MonolingualTextValue {
  language: String!
  text: String!
}

type QuantityValue {
  amount: String!
  unit: String!
  lowerBound: String
  upperBound: String
}

type StringValue implements StringContentProvider {
  content: String!
}

type TimeValue {
  time: String!
  timezone: Int!
  before: Int!
  after: Int!
  precision: Int!
  calendarModel: String!
}

type EntityValue {
  id: String!
}

type UnknownValue {
  content: Json!
}

scalar Json

enum ValueType {
  VALUE
  SOME_VALUE
  NO_VALUE
}

enum Rank {
  PREFERRED
  NORMAL
  DEPRECATED
}

type Qualifier implements PropertyValuePair {
  property: PredicateProperty!
  value: Value
  valueType: ValueType!
}

type Reference {
  parts: [ReferencePart]!
}

type ReferencePart implements PropertyValuePair {
  property: PredicateProperty!
  value: Value
  valueType: ValueType!
}

"The result of looking up an item by an external identifier."
union ItemByExternalIdResult = Item | ExternalIdNonUnique

"Indicates that multiple items match the given external identifier."
type ExternalIdNonUnique {
  "IDs of the items that match the given external identifier."
  items: [ItemId!]!
}

"Filter used to match items by their statements. Supports simple property/value matching or combining multiple filters with an operator."
input ItemSearchFilter {
  "Combine multiple conditions using AND operator. Requires at least two conditions, all of which must match. Cannot be used together with any other field."
  and: [AndOperationCondition!]

  "Combine multiple conditions using OR operator. Requires at least two conditions, one of which must match. Cannot be used together with any other field."
  or: [ItemSearchCondition!]

  "Search for items that do not have a certain statement using NOT operator. Supports a single property/value condition. Cannot be used together with any other field."
  not: ItemSearchCondition
  property: PropertyId
  value: String
}

"A condition within an AND operation used in item search. Supports simple property/value matching or combining multiple filters with OR."
input AndOperationCondition {
  "Combine multiple conditions using OR operator. Requires at least two conditions, one of which must match. Cannot be used together with any other field."
  or: [ItemSearchCondition!]

  "Search for items that do not have a certain statement using NOT operator. Supports a single property/value condition. Cannot be used together with any other field."
  not: ItemSearchCondition
  property: PropertyId
  value: String
}

"A single property/value condition used in item search."
input ItemSearchCondition {
  property: PropertyId
  value: String
}

"The result of a search query for items."
type ItemSearchResultConnection {
  "List of search result edges for the current page."
  edges: [ItemSearchResultEdge!]!

  "Pagination information about the current page of result set."
  pageInfo: PageInfo!
}

"An edge in the search result containing a matched item and its pagination cursor."
type ItemSearchResultEdge {
  "The matched result item."
  node: Item!

  "Cursor identifying this result within the result set, used for pagination."
  cursor: String!
}

"Pagination information about the current page of results."
type PageInfo {
  "Cursor of the last result in the current page."
  endCursor: String

  "Indicates whether there are more results available before the current page."
  hasPreviousPage: Boolean!

  "Indicates whether there are more results available after the current page."
  hasNextPage: Boolean!

  "Cursor of the first result in the current page."
  startCursor: String
}
